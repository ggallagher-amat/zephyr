description: Alif Cyclic Redundancy Check

compatible: "alif,alif-crc"
include: [base.yaml]

properties:
  reg:
    required: true

  crc-algo:
    type: string
    required: true
    description: Select CRC algorithm
    enum:
      - "crc8-ccitt"
      - "crc16"
      - "crc16-ccitt"
      - "crc32"
      - "crc32c"
